services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      NODE_ENV: development
      DOCKER_ENV: 'true'
      POSTGRES_HOST: '${POSTGRES_HOST:-db}'
      POSTGRES_PORT: '${POSTGRES_PORT:-5432}'
      POSTGRES_DB: '${POSTGRES_DB:-postgres}'
      POSTGRES_USER: '${POSTGRES_USER:-postgres}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}'
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d e_commerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Fastify TypeScript API
  api:
    build:
      context: .
      dockerfile: apps/e-commerce-api/Dockerfile
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      # Database Connection
      - DATABASE_TYPE=postgres
      - DATABASE_HOST='${POSTGRES_HOST:-db}'
      - DATABASE_PORT='${POSTGRES_PORT:-5432}'
      - DATABASE_USER='${POSTGRES_USER:-postgres}'
      - DATABASE_PASSWORD='${POSTGRES_PASSWORD:-postgres}'
      - DATABASE_NAME='${POSTGRES_DB:-postgres}'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_data:/usr/src/app
    restart: always

  # Next.js App Router Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Server-side URL (Internal Docker network)
      - API_URL=http://api:8080 
      # Client-side URL (Browser access)
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    restart: always

volumes:
  api_data:
  pg_data:
