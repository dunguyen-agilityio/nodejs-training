name: Preview API (Pull Request)

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main, feat/apply-devops]
    paths:
      - "e-commerce-api/apps/e-commerce-api/**"
      - "e-commerce-api/packages/**"
      - "e-commerce-api/package.json"
      - "e-commerce-api/pnpm-lock.yaml"
      - ".github/workflows/preview-api.yml"

defaults:
  run:
    working-directory: e-commerce-api

jobs:
  build-and-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: e-commerce-api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm --filter e-commerce-api lint

      - name: Check types
        run: pnpm --filter e-commerce-api check-types

      - name: Build
        run: pnpm --filter e-commerce-api build

      - name: Build Docker Image (Dry Run)
        run: |
          docker build -t e-commerce-api:preview -f apps/e-commerce-api/Dockerfile.prod .

  deploy-railway-preview:
    if: github.event.action != 'closed'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link to Railway Project
        # Establishing link first makes subsequent commands more reliable
        run: doppler run -- railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create or Update Railway PR Environment
        run: |
          doppler run -- railway environment new pr-${{ github.event.number }} --copy dev || echo "Environment already exists"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Sync Doppler Secrets to Railway PR Environment
        run: |
          doppler secrets download --format json --no-file | doppler run -- railway variables set --environment pr-${{ github.event.number }} --service e-commerce-api --variables -
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy API Preview (Railway)
        run: doppler run -- railway up --service e-commerce-api --environment pr-${{ github.event.number }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  cleanup-railway-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link to Railway Project
        run: doppler run -- railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Delete Railway PR Environment
        run: doppler run -- railway environment delete pr-${{ github.event.number }} --confirm || true
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
