name: Preview API (Pull Request)

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main, feat/apply-devops]
    paths:
      - "e-commerce-api/apps/e-commerce-api/**"
      - "e-commerce-api/packages/**"
      - "e-commerce-api/package.json"
      - "e-commerce-api/pnpm-lock.yaml"
      - ".github/workflows/preview-api.yml"

concurrency:
  group: preview-api-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: e-commerce-api

jobs:
  build-and-validate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: e-commerce-api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter e-commerce-api lint

      - name: Check types
        run: pnpm --filter e-commerce-api check-types

      - name: Build
        run: pnpm --filter e-commerce-api build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: e-commerce-api
          file: e-commerce-api/apps/e-commerce-api/Dockerfile.prod
          push: false
          tags: e-commerce-api:preview
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-railway-preview:
    if: github.event.action != 'closed'
    needs: build-and-validate
    runs-on: ubuntu-latest
    environment: Development
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3

      - name: Link to Railway Project
        # Establishing link first makes subsequent commands more reliable
        run: doppler run -- railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create or Update Railway PR Environment
        run: |
          doppler run -- railway environment new pr-${{ github.event.number }} --copy dev || true
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Sync Doppler Secrets to Railway PR Environment
        run: |
          doppler secrets download --format json --no-file | \
            doppler run -- railway variables set \
              --environment pr-${{ github.event.number }} \
              --service e-commerce-api \
              --variables -
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy API Preview (Railway)
        id: deploy
        run: |
          OUTPUT=$(doppler run -- railway up \
            --service e-commerce-api \
            --environment pr-${{ github.event.number }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.railway\.app[^ ]*' | tail -1)
          echo "preview_url=${URL:-}" >> "$GITHUB_OUTPUT"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const body = url
              ? `### API Preview Deployed\n\nPreview URL: ${url}\n\n_Environment: \`pr-${{ github.event.number }}\`_`
              : `### API Preview Deployed\n\nDeployment complete. Check the [Railway dashboard](https://railway.app) for the URL.\n\n_Environment: \`pr-${{ github.event.number }}\`_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('API Preview Deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-railway-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: Development
    timeout-minutes: 10

    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3

      - name: Link to Railway Project
        run: doppler run -- railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Delete Railway PR Environment
        run: doppler run -- railway environment delete pr-${{ github.event.number }} --confirm || true
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
