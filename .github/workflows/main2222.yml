  docker-build-api:
    name: Docker Build API
    # needs: build-and-test
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push e-commerce-api Image
        uses: docker/build-push-action@v5
        with:
          context: e-commerce-api
          file: e-commerce-api/apps/e-commerce-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

